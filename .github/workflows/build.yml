name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller pcb_optimizer_linux.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCBArrayOptimizer-Linux
          path: dist/PCBArrayOptimizer

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller pcb_optimizer_windows.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCBArrayOptimizer-Windows
          path: dist/PCBArrayOptimizer.exe

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  release:
    needs: [build-linux, build-windows, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: PCBArrayOptimizer-Linux
          path: linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PCBArrayOptimizer-Windows
          path: windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/PCBArrayOptimizer
            windows/PCBArrayOptimizer.exe
          generate_release_notes: true
